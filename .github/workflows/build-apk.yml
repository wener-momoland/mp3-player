name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Add Android platform
      run: npx cap add android || true

    - name: Sync Android project
      run: npx cap sync android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Replace app icon
      run: |
        if [ -f "icons/app_icon.png" ]; then
          echo "正在替换应用图标..."
          sudo apt-get install -y imagemagick
          
          # 定义图标尺寸
          sizes=("48" "72" "96" "144" "192")
          dirs=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
          
          for i in "${!sizes[@]}"; do
            size=${sizes[$i]}
            dir=${dirs[$i]}
            target_dir="android/app/src/main/res/$dir"
            mkdir -p "$target_dir"
            
            convert icons/app_icon.png -resize ${size}x${size} "$target_dir/ic_launcher.png"
            convert icons/app_icon.png -resize ${size}x${size} "$target_dir/ic_launcher_round.png"
            
            echo "已生成 $dir 图标 (${size}x${size})"
          done
          
          echo "图标替换完成！"
        else
          echo "未找到自定义图标文件，使用默认图标"
        fi

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
